<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper Jumpscare</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1f1f1f;
    color: white;
    text-align: center;
    margin: 0;
}

h1 {
    margin-top: 20px;
    margin-bottom: 5px;
}

#counter-display {
    font-size: 20px;
    font-weight: bold;
    color: #4caf50;
    margin: 10px 0;
    background: #2a2a2a;
    display: inline-block;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #4caf50;
}

#board {
    display: grid;
    grid-template-columns: repeat(5, 50px);
    gap: 4px;
    justify-content: center;
    margin-top: 15px;
}

.cell {
    width: 50px;
    height: 50px;
    border: none;
    background: #666;
    color: white;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
}

.cell:hover {
    background: #777;
}

.revealed {
    background: #d9d9d9;
    color: black;
    cursor: default;
}

.cell img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
}

/* POPUP MODAL SYSTEM */
#popup, #win-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.modal-content {
    background: #151515;
    padding: 30px;
    border-radius: 12px;
    border: 3px solid #e53935;
    box-shadow: 0 0 30px rgba(229, 57, 53, 0.6);
    text-align: center;
    max-width: 90%;
}

/* Green theme for the Win Popup content card */
#win-popup .modal-content {
    border: 3px solid #4caf50;
    box-shadow: 0 0 30px rgba(76, 175, 80, 0.6);
}

.caption {
    color: #e53935; 
    font-size: 28px; 
    margin-top: 0;
    margin-bottom: 20px; 
    font-weight: bold;
    text-transform: uppercase;
}

.win-caption {
    color: #4caf50;
    font-size: 32px;
    margin-top: 0;
    margin-bottom: 15px;
    font-weight: bold;
}

video {
    max-width: 100%;
    border-radius: 6px;
    background: black;
}

.close {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 6px;
    background: #e53935;
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}

.win-close {
    background: #4caf50;
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>Minesweeper</h1>
<p style="margin: 5px 0;">Click a square... if you dare.</p>

<!-- Live Counter Display -->
<div id="counter-display">Remaining Tiles to Win: <span id="clicks-left">10</span></div>

<div id="board"></div>

<!-- Rickrolled Jumpscare Overlay -->
<div id="popup">
    <div class="modal-content">
        <h2 class="caption">HAHAHAH YOU'VE BEEN RICKROLLED!🤣🫵</h2>
        <video id="jumpscareVideo" width="640" height="360">
            <source src="rickrolled.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <br>
        <button class="close" onclick="resetGame()">Close Game</button>
    </div>
</div>

<!-- Victory Win Overlay -->
<div id="win-popup">
    <div class="modal-content">
        <h2 class="win-caption">🎉 YOU WIN! 🎉</h2>
        <p style="font-size: 18px; color: #eee;">Incredible! You successfully avoided the Rickroll.</p>
        <button class="win-close" onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
const size = 5;
const bombCount = 4; 
let remainingTargets = 10; // Number of clicks required to win
const board = document.getElementById("board");
const cells = [];

// Initialize board data
for (let i = 0; i < size * size; i++) {
    cells.push({ bomb: false, revealed: false });
}

// Randomly place bombs
let placed = 0;
while (placed < bombCount) {
    let index = Math.floor(Math.random() * cells.length);
    if (!cells[index].bomb) {
        cells[index].bomb = true;
        placed++;
    }
}

// Create the 5x5 visual grid
for (let i = 0; i < cells.length; i++) {
    const button = document.createElement("button");
    button.className = "cell";
    button.id = "cell-" + i;
    button.onclick = () => reveal(i);
    board.appendChild(button);
}

function reveal(index) {
    if (cells[index].revealed) return;

    cells[index].revealed = true;
    let button = document.getElementById("cell-" + index);
    button.classList.add("revealed");

    if (cells[index].bomb) {
        button.textContent = "💣";
        gameOver();
        return;
    }

    // Displays gen.jpg for every safe box clicked
    const img = document.createElement("img");
    img.src = "gen.jpg"; 
    img.alt = "Safe";
    button.appendChild(img);

    // Track score logic
    remainingTargets--;
    document.getElementById("clicks-left").textContent = remainingTargets;

    // Trigger victory once counter lands at 0
    if (remainingTargets === 0) {
        gameWin();
    }
}

function gameOver() {
    document.getElementById("popup").style.display = "flex";
    const video = document.getElementById("jumpscareVideo");
    video.currentTime = 0; 
    video.play().catch(err => console.log("Playback error: ", err));
}

function gameWin() {
    document.getElementById("win-popup").style.display = "flex";
}

function resetGame() {
    const video = document.getElementById("jumpscareVideo");
    video.pause(); 
    document.getElementById("popup").style.display = "none";
    document.getElementById("win-popup").style.display = "none";
    location.reload(); 
}

window.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        resetGame();
    }
});
</script>

</body>
</html>
